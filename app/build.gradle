plugins {
    id 'com.android.application'
}

android {
    namespace 'com.oweebee.kangbangaming'
    compileSdk 34

    defaultConfig {
        applicationId "com.oweebee.kangbangaming"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // Aucune dépendance externe — Android SDK pur
}
