name: Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # nécessaire pour créer des releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Get version
        id: version
        run: echo "tag=build-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: KangBanGaming ${{ steps.version.outputs.tag }}
          body: |
            APK Android — WebView KangBanGaming

            **Installation :**
            1. Télécharge `KangBanGaming.apk`
            2. Transfère sur ton téléphone Android
            3. Paramètres → Sécurité → Sources inconnues → Autoriser
            4. Ouvre le fichier `.apk` pour installer
            5. Au premier lancement, entre l'URL de ton serveur
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
